name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm ci && npm run build

      - name: Check Firebase Secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFOLIO_54FF2 }}" ]; then
            echo "Firebase secret is EMPTY"
            exit 1
          else
            echo "Firebase secret exists"
          fi

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFOLIO_54FF2 }}
          channelId: live
          projectId: portfolio-54ff2